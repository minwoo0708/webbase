<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>명함 신청 페이지</title>
</head>
<body>
    <header style="background-color: white;">
        <h1>명함 신청 페이지</h1>
    </header>

    <main style="background-color: skyblue;">
        <form>
            <pre style="font-family: inherit;">
1. 학년: <select name="grade">
            <option value="1학년">1학년</option>
            <option value="2학년">2학년</option>
            <option value="3학년">3학년</option>
         </select>

2. 반: <select name="class">
          <option value="1반">1반</option>
          <option value="2반">2반</option>
          <option value="3반">3반</option>
          <option value="4반">4반</option>
       </select>

3. 번호: <input type="text" name="number">
4. 이름: <input type="text" name="name">

5. 원하는 시안 번호 선택
<img src="과제방참고URL" width="600">

<input type="radio" name="design" value="1안"> 1안 <input type="radio" name="design" value="2안"> 2안 <input type="radio" name="design" value="3안"> 3안 <input type="radio" name="design" value="4안"> 4안
<input type="radio" name="design" value="5안"> 5안 <input type="radio" name="design" value="6안"> 6안 <input type="radio" name="design" value="7안"> 7안 <input type="radio" name="design" value="8안"> 8안

6. 내가 명함에 넣고 싶은 항목 선택
<input type="checkbox" name="item" value="이름"> 이름 <input type="checkbox" name="item" value="이메일"> 이메일
<input type="checkbox" name="item" value="디스코드"> 디스코드 <input type="checkbox" name="item" value="깃헙"> 깃헙
<input type="checkbox" name="item" value="관심분야"> 관심분야 <input type="checkbox" name="item" value="폰번호"> 폰번호

7. 기타 건의사항
<textarea name="suggestion" cols="20" rows="10"></textarea>

<input type="submit" value="전송하기"> <button type="reset">초기화하기</button>
            </pre>
        </form>
    </main>

    <footer style="background-color: yellow;">
        <h2>QnA</h2>
        <details>
            <summary>언제까지 내요?</summary>
            3월 11일까지 제출합니다
        </details>
        <details>
            <summary>명함 얼마에요?</summary>
            무료입니다
        </details>
        <details>
            <summary>늦게 내면 어떻게돼요?</summary>
            1학년 <strong>전원</strong>의 명함발급이 늦어집니다
        </details>
    </footer>
</body>
</html>
